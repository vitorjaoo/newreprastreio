<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Lima Representações</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-brand">Lima <span>Representações</span></div>
      <div class="login-brand-sub">Portal do Cliente</div>
      <div class="login-divider"></div>
      <div class="login-subtitle">Acesse seus documentos e pedidos</div>
    </div>

    {% if erro %}
    <div class="alert alert-danger">{{ erro }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">CNPJ ou usuário</label>
        <input class="form-control" type="text" name="cnpj"
               placeholder="00.000.000/0001-00" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-control" type="password" name="senha"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:.75rem;padding:.75rem">
        Entrar
      </button>
    </form>

    <p class="text-muted" style="text-align:center;margin-top:1.5rem;font-size:.78rem">
      Primeiro acesso? Solicite suas credenciais ao escritório.
    </p>
  </div>
</div>
</body>
</html>
