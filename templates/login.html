<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — {{ nome_escritorio }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
      </div>
      <h2>{{ nome_escritorio }}</h2>
      <p>Acesse seus documentos e pedidos</p>
    </div>

    {% if erro %}
    <div class="alert alert-danger">{{ erro }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">CNPJ ou usuário</label>
        <input class="form-control" type="text" name="cnpj"
               placeholder="00.000.000/0001-00" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-control" type="password" name="senha"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem">
        Entrar
      </button>
    </form>

    <p class="text-muted" style="text-align:center;margin-top:1.25rem;font-size:.8rem">
      Primeiro acesso? Solicite suas credenciais ao escritório.
    </p>
  </div>
</div>
</body>
</html>
