{% extends "base.html" %}
{% block title %}Trocar Senha{% endblock %}
{% block page_title %}Trocar Senha{% endblock %}

{% block content %}
<div style="max-width:420px">
  <div class="card">
    <div class="card-header"><span class="card-title">🔒 Nova senha</span></div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Senha atual</label>
          <input class="form-control" type="password" name="senha_atual" required>
        </div>
        <div class="form-group">
          <label class="form-label">Nova senha</label>
          <input class="form-control" type="password" name="senha_nova" required minlength="4">
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar nova senha</label>
          <input class="form-control" type="password" name="confirmar" required minlength="4">
        </div>
        <button type="submit" class="btn btn-primary btn-full">Salvar nova senha</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
